id: api-server
name: "API 서버"
description: "REST/GraphQL API 백엔드 서버 — Node.js, Python, Go"
discoveryQuestions:
  - id: auth
    question: "인증 방식은?"
    options:
      - { label: "JWT 토큰", value: "jwt" }
      - { label: "API 키", value: "api-key" }
      - { label: "OAuth2", value: "oauth2" }
      - { label: "필요 없음", value: "none" }
    allowFreeText: false
    order: 1
  - id: endpoints
    question: "핵심 API 엔드포인트는?"
    options:
      - { label: "CRUD (생성/조회/수정/삭제)", value: "crud" }
      - { label: "검색/필터링", value: "search" }
      - { label: "파일 업로드", value: "upload" }
      - { label: "실시간 (WebSocket)", value: "realtime" }
    allowFreeText: true
    order: 2
  - id: database
    question: "데이터베이스는?"
    options:
      - { label: "PostgreSQL", value: "postgresql" }
      - { label: "MongoDB", value: "mongodb" }
      - { label: "MySQL", value: "mysql" }
      - { label: "SQLite", value: "sqlite" }
    allowFreeText: false
    order: 3
  - id: realtime
    question: "실시간 기능이 필요한가요?"
    options:
      - { label: "WebSocket", value: "websocket" }
      - { label: "SSE (Server-Sent Events)", value: "sse" }
      - { label: "필요 없음", value: "none" }
    allowFreeText: false
    order: 4
  - id: docs
    question: "API 문서가 필요한가요?"
    options:
      - { label: "OpenAPI/Swagger", value: "swagger" }
      - { label: "간단한 README", value: "readme" }
      - { label: "필요 없음", value: "none" }
    allowFreeText: false
    order: 5
evaluatorCriteria:
  - "서버 시작 에러 없음"
  - "핵심 엔드포인트 200 응답"
  - "인증 플로우 동작 (해당 시)"
  - "에러 핸들링 (4xx/5xx 적절한 응답)"
  - "데이터 유효성 검증"
baseGuidelines: |
  이 프로젝트는 API 서버입니다. 핵심 원칙:
  - RESTful 규칙 준수 (적절한 HTTP 메서드, 상태 코드)
  - 입력 유효성 검증 필수 (zod, joi 등)
  - 에러 핸들링 미들웨어 구성
  - 환경 변수로 설정 관리 (.env)
  - 로깅 구조화 (요청/응답/에러)
