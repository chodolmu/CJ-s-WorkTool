id: desktop
name: "데스크톱 앱"
description: "크로스 플랫폼 데스크톱 앱 — Electron, Tauri"
discoveryQuestions:
  - id: framework
    question: "프레임워크는?"
    options:
      - { label: "Electron", value: "electron" }
      - { label: "Tauri", value: "tauri" }
    allowFreeText: false
    order: 1
  - id: os
    question: "타겟 OS는?"
    options:
      - { label: "Windows + Mac + Linux", value: "all" }
      - { label: "Windows만", value: "windows" }
      - { label: "Mac만", value: "mac" }
    allowFreeText: false
    order: 2
  - id: native-features
    question: "사용할 네이티브 기능은?"
    options:
      - { label: "파일 시스템 접근", value: "filesystem" }
      - { label: "시스템 트레이", value: "tray" }
      - { label: "네이티브 알림", value: "notifications" }
      - { label: "자동 업데이트", value: "auto-update" }
    allowFreeText: true
    order: 3
  - id: update
    question: "자동 업데이트가 필요한가요?"
    options:
      - { label: "GitHub Releases 기반", value: "github" }
      - { label: "커스텀 서버", value: "custom" }
      - { label: "필요 없음", value: "none" }
    allowFreeText: false
    order: 4
  - id: packaging
    question: "배포 형태는?"
    options:
      - { label: "인스톨러 (.exe/.dmg)", value: "installer" }
      - { label: "포터블", value: "portable" }
      - { label: "둘 다", value: "both" }
    allowFreeText: false
    order: 5
evaluatorCriteria:
  - "빌드 에러 없이 실행 가능"
  - "네이티브 기능 동작 (파일 시스템, 알림 등)"
  - "창 관리 정상 (최소화/최대화/닫기)"
  - "패키징 빌드 성공"
baseGuidelines: |
  이 프로젝트는 데스크톱 앱입니다. 핵심 원칙:
  - Main/Renderer 프로세스 분리 (Electron) 또는 Rust/Frontend 분리 (Tauri)
  - IPC 통신으로 프로세스 간 데이터 전달
  - 네이티브 기능은 Main 프로세스에서 처리
  - 보안: contextIsolation 활성화, nodeIntegration 비활성화
  - 로컬 데이터 저장은 SQLite 또는 JSON 파일
