  - "네비게이션 구조(Stack/Tab/Drawer)를 먼저 설계"
  - "플랫폼별 차이점을 명시"
  - "JSON 형태로 features 배열 출력"
outputFormat: '{"features": [{"name": "...", "description": "...", "order": 1}]}'
