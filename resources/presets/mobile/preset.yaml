id: mobile
name: "모바일 앱"
description: "크로스 플랫폼 모바일 앱 — React Native, Flutter, Expo"
discoveryQuestions:
  - id: platform
    question: "타겟 플랫폼은?"
    options:
      - { label: "iOS + Android", value: "both" }
      - { label: "iOS만", value: "ios" }
      - { label: "Android만", value: "android" }
    allowFreeText: false
    order: 1
  - id: framework
    question: "프레임워크는?"
    options:
      - { label: "React Native (Expo)", value: "expo" }
      - { label: "React Native (CLI)", value: "rn-cli" }
      - { label: "Flutter", value: "flutter" }
    allowFreeText: false
    order: 2
  - id: offline
    question: "오프라인 지원이 필요한가요?"
    options:
      - { label: "필수", value: "required" }
      - { label: "선택적", value: "optional" }
      - { label: "불필요", value: "none" }
    allowFreeText: false
    order: 3
  - id: native-features
    question: "사용할 네이티브 기능은?"
    options:
      - { label: "카메라", value: "camera" }
      - { label: "GPS/위치", value: "gps" }
      - { label: "푸시 알림", value: "push" }
      - { label: "없음", value: "none" }
    allowFreeText: true
    order: 4
  - id: target
    question: "주 사용자는?"
    options:
      - { label: "일반 소비자", value: "consumer" }
      - { label: "비즈니스", value: "business" }
      - { label: "사내 직원", value: "internal" }
    allowFreeText: false
    order: 5
evaluatorCriteria:
  - "빌드 에러 없이 실행 가능"
  - "네이티브 기능 기본 동작"
  - "네비게이션 정상 동작"
  - "오프라인 모드 기본 동작 (해당 시)"
baseGuidelines: |
  이 프로젝트는 모바일 앱입니다. 핵심 원칙:
  - 네비게이션 구조를 먼저 설계
  - 플랫폼별 UI 가이드라인 준수 (iOS HIG, Material Design)
  - 오프라인 우선 아키텍처 고려
  - 네이티브 모듈은 필요 시에만 추가
  - 성능 최적화 (FlatList, 이미지 캐싱)
