id: game
name: "게임"
description: "2D/3D 게임 개발 — 플랫포머, RPG, 퍼즐, 액션 등"
discoveryQuestions:
  - id: genre
    question: "어떤 장르의 게임을 만드시나요?"
    options:
      - { label: "플랫포머", value: "platformer", description: "점프와 이동 중심의 횡스크롤 게임" }
      - { label: "RPG", value: "rpg", description: "캐릭터 성장과 스토리 중심" }
      - { label: "퍼즐", value: "puzzle", description: "논리적 문제 해결" }
      - { label: "액션", value: "action", description: "빠른 전투와 반사 신경" }
    allowFreeText: true
    order: 1
  - id: game-loop
    question: "게임의 핵심 루프는 무엇인가요?"
    options:
      - { label: "점프로 적 피하기", value: "jump-avoid" }
      - { label: "전투로 적 처치", value: "combat" }
      - { label: "퍼즐 풀기", value: "solve-puzzle" }
      - { label: "아이템 수집", value: "collect" }
    allowFreeText: true
    order: 2
  - id: controls
    question: "조작 방식은?"
    options:
      - { label: "키보드", value: "keyboard" }
      - { label: "마우스", value: "mouse" }
      - { label: "터치", value: "touch" }
      - { label: "게임패드", value: "gamepad" }
    allowFreeText: false
    order: 3
  - id: graphics
    question: "그래픽 스타일은?"
    options:
      - { label: "픽셀 아트", value: "pixel" }
      - { label: "벡터/미니멀", value: "vector" }
      - { label: "3D 로우폴리", value: "3d-lowpoly" }
      - { label: "만화/일러스트", value: "cartoon" }
    allowFreeText: true
    order: 4
  - id: reference
    question: "참고할 게임이 있나요?"
    options: []
    allowFreeText: true
    order: 5
  - id: target
    question: "타겟 플레이어는?"
    options:
      - { label: "캐주얼 게이머", value: "casual" }
      - { label: "하드코어 게이머", value: "hardcore" }
      - { label: "어린이", value: "kids" }
      - { label: "모든 연령", value: "all-ages" }
    allowFreeText: false
    order: 6
  - id: sound
    question: "사운드/음악이 필요한가요?"
    options:
      - { label: "BGM + 효과음", value: "full" }
      - { label: "효과음만", value: "sfx-only" }
      - { label: "없음", value: "none" }
    allowFreeText: false
    order: 7
evaluatorCriteria:
  - "빌드 에러 없이 실행 가능"
  - "게임 루프가 정상 동작 (시작→플레이→종료)"
  - "사용자 입력에 반응 (키보드/마우스/터치)"
  - "기본 그래픽 렌더링 정상"
  - "충돌 감지 기본 동작"
baseGuidelines: |
  이 프로젝트는 게임입니다. 게임 개발 핵심 원칙:
  - 게임 루프(update → render)를 명확히 분리
  - 프레임 독립적 움직임 (deltaTime 사용)
  - 충돌 감지는 AABB부터 시작
  - 에셋은 placeholder로 시작, 나중에 교체
  - 성능을 고려한 렌더링 (requestAnimationFrame)
